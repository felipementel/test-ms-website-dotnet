name:  Open issue thanks
on:
  issues:
    types: [opened]
permissions:
  contents: read
  issues: write
jobs:
  asses-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Add Label and thanks comment to Issue
        uses: actions/github-script@v9
        with:
          script: |
            const issueAuthor = context.payload.sender.login
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['needs-review']
            })
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `👋 Obrigado pela contribuição, @${ issueAuthor }! Vamos analisar o problema e entraremos em contato em breve.`
            })
            
      - name: Auto-assign issue
        uses: pozil/auto-assign-issue@v3
        with:
          repo-token:  ${{ secrets.GITHUB_TOKEN }}
          assignees: felipementel
